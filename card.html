<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tarjetas canción latinoamericana</title>
  <link rel="stylesheet" href="card.css">
</head>
<body>
  <main class="shell">
    <aside class="left-column">
      <div class="left-header">
        <h1 class="app-title">Canción latinoamericana</h1>
        <p class="app-subtitle">Generador de tarjetas</p>
        <div class="layout-switcher">
          <button class="layout-button active" data-layout="vertical">Vertical</button>
          <button class="layout-button" data-layout="horizontal">Horizontal</button>
          <button class="layout-button" data-layout="full">Completa</button>
        </div>
        <button type="button" class="download-button" id="downloadButton">
          Descargar PNG
        </button>
      </div>

      <div class="left-scroll">
        <div id="timeline" class="timeline"></div>
      </div>
    </aside>

    <section class="right-column">
      <div class="right-fixed">
        <div id="cardPreview" class="card-preview">
          Cargando datos…
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="card.js"></script>
</body>
</html>
