<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline de canción latinoamericana</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <div class="shell">
    <aside class="left-column">
      <div class="left-header">
        <h1 class="app-title">Canción latinoamericana</h1>
      </div>

      <div class="left-scroll" id="leftScroll">
        <div id="timeline" class="timeline"></div>
      </div>
    </aside>

    <main class="right-column">
      <div class="right-fixed">
        <div id="detail" class="detail empty">
          <p>Selecciona un elemento de la línea de tiempo.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
